<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EEG 波形标注工具</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="toolbar">
            <h1 class="app-title">EEG 标注器</h1>
            <div class="toolbar-group">
                <button id="btn-open" class="btn btn-primary">打开EDF</button>
                <div class="recent-files-dropdown">
                    <button id="btn-recent" class="btn">最近文件 ▾</button>
                    <div id="recent-files-menu" class="recent-files-menu hidden"></div>
                </div>
                <button id="btn-channels" class="btn">通道</button>
                <button id="btn-bipolar" class="btn">双极导联</button>
            </div>
            <div class="toolbar-separator"></div>
            <div class="toolbar-group">
                <button id="btn-fixed-height" class="btn">固定高度</button>
                <button id="btn-fft" class="btn">FFT</button>
                <button id="btn-export" class="btn btn-success">导出</button>
                <button id="btn-import" class="btn">导入</button>
            </div>
            <div class="toolbar-separator"></div>
            <span id="file-info" class="file-info">未加载文件</span>
            <div class="toolbar-spacer"></div>
            <button id="btn-anno" class="btn">标注</button>
            <span id="time-range" class="time-range">0:00 - 0:00</span>
        </header>

        <main class="content">
            <aside id="channel-panel" class="panel panel-left panel-floating hidden">
                <div class="panel-header">
                    <h3>通道</h3>
                    <div class="panel-actions">
                        <button id="btn-select-all" class="btn-sm" title="全选">全选</button>
                        <button id="btn-deselect-all" class="btn-sm" title="全不选">全不选</button>
                        <button id="btn-close-channels" class="btn-sm" title="关闭">&times;</button>
                    </div>
                </div>
                <input type="text" id="channel-search" placeholder="搜索通道..." class="search-input">
                <div id="channel-list" class="channel-list"></div>
                <div id="channel-count" class="channel-count">0/0</div>
            </aside>

            <section class="waveform-area">
                <div class="time-bar">
                    <span id="current-time" class="time-display">0:00</span>
                    <input type="text" id="goto-time" class="goto-input" placeholder="跳转" title="输入时间后回车跳转">
                    <span class="time-sep">/</span>
                    <span id="total-time" class="time-display">0:00</span>
                    <div class="time-bar-controls">
                        <div class="control-group">
                            <label class="control-label">敏感度</label>
                            <select id="sensitivity-select" class="control-select">
                                <option value="10">10 μV</option>
                                <option value="20">20 μV</option>
                                <option value="30">30 μV</option>
                                <option value="50">50 μV</option>
                                <option value="70">70 μV</option>
                                <option value="100" selected>100 μV</option>
                                <option value="200">200 μV</option>
                                <option value="300">300 μV</option>
                                <option value="500">500 μV</option>
                                <option value="1000">1000 μV</option>
                                <option value="2000">2000 μV</option>
                                <option value="3000">3000 μV</option>
                            </select>
                        </div>
                        <div class="control-group">
                            <label class="control-label">时间窗</label>
                            <select id="window-select" class="control-select">
                                <option value="10" selected>10s</option>
                                <option value="20">20s</option>
                                <option value="30">30s</option>
                                <option value="60">60s</option>
                                <option value="120">2min</option>
                                <option value="180">3min</option>
                                <option value="300">5min</option>
                                <option value="600">10min</option>
                            </select>
                        </div>
                        <div class="control-group">
                            <label class="control-label">陷波</label>
                            <select id="notch-select" class="control-select">
                                <option value="off" selected>关</option>
                                <option value="50">50Hz</option>
                                <option value="60">60Hz</option>
                            </select>
                        </div>
                        <div class="control-group">
                            <label class="control-label">高通</label>
                            <select id="highpass-select" class="control-select">
                                <option value="off" selected>关</option>
                                <option value="0.1">0.1Hz</option>
                                <option value="0.5">0.5Hz</option>
                                <option value="1">1Hz</option>
                                <option value="5">5Hz</option>
                                <option value="10">10Hz</option>
                            </select>
                        </div>
                        <div class="control-group">
                            <label class="control-label">低通</label>
                            <select id="lowpass-select" class="control-select">
                                <option value="off" selected>关</option>
                                <option value="15">15Hz</option>
                                <option value="30">30Hz</option>
                                <option value="50">50Hz</option>
                                <option value="70">70Hz</option>
                                <option value="100">100Hz</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="canvas-container">
                    <div id="channel-labels" class="channel-labels"></div>
                    <canvas id="waveform-canvas"></canvas>
                    <canvas id="time-axis-canvas"></canvas>
                    <div id="waveform-tooltip" class="waveform-tooltip hidden"></div>
                </div>
            </section>

            <aside id="anno-panel" class="panel panel-right panel-floating-anno hidden">
                <div class="panel-header">
                    <h3>标注</h3>
                    <div class="panel-actions">
                        <button id="btn-anno-mode" class="btn-sm btn-anno-toggle">开始标注</button>
                        <button id="btn-close-anno" class="btn-sm" title="关闭">&times;</button>
                    </div>
                </div>
                <div class="anno-form">
                    <div class="anno-step" id="step-channel">
                        <div class="step-header">
                            <span class="step-num">1</span>
                            <span class="step-title">选择通道</span>
                        </div>
                        <div class="step-content">
                            <select id="anno-channel" class="form-input">
                                <option value="">点击波形选中</option>
                            </select>
                            <span class="step-hint" id="channel-hint">点击波形上的通道自动选中</span>
                        </div>
                    </div>
                    <div class="anno-step" id="step-time">
                        <div class="step-header">
                            <span class="step-num">2</span>
                            <span class="step-title">选择时间</span>
                        </div>
                        <div class="step-content">
                            <div class="time-inputs">
                                <div class="time-input-group">
                                    <label>起始</label>
                                    <input type="text" id="anno-start" class="form-input time-input" readonly>
                                </div>
                                <div class="time-input-group">
                                    <label>终止</label>
                                    <input type="text" id="anno-end" class="form-input time-input" readonly>
                                </div>
                            </div>
                            <span class="step-hint" id="time-hint">中键点击波形开始标注</span>
                        </div>
                    </div>
                    <div class="anno-step" id="step-label">
                        <div class="step-header">
                            <span class="step-num">3</span>
                            <span class="step-title">选择标签</span>
                        </div>
                        <div class="step-content">
                            <select id="anno-label" class="form-input">
                                <option value="lvfa">LVFA</option>
                                <option value="pre-ictal">发作前期</option>
                                <option value="inter-ictal">发作间期</option>
                                <option value="ictal">发作期</option>
                                <option value="post-ictal">发作后期</option>
                                <option value="other">其他</option>
                            </select>
                        </div>
                    </div>
                    <div class="anno-step" id="step-note">
                        <div class="step-header">
                            <span class="step-num">4</span>
                            <span class="step-title">备注（可选）</span>
                        </div>
                        <div class="step-content">
                            <input type="text" id="anno-note" class="form-input" placeholder="描述性文字...">
                        </div>
                    </div>
                    <button id="btn-add-anno" class="btn btn-primary btn-block">+ 添加标注</button>
                </div>
                <div class="anno-list-header">
                    <span id="anno-count">标注: 0</span>
                    <div class="anno-header-actions">
                        <button id="btn-label-types" class="btn-sm" title="标注类型设置 ⚙">⚙</button>
                        <button id="btn-clear-annos" class="btn-sm btn-danger">清空</button>
                    </div>
                </div>
                <div id="annotations-list" class="annotations-list"></div>
            </aside>
        </main>

        <footer id="status-bar" class="status-bar status-info">就绪</footer>
    </div>

    <div id="autosave-modal" class="modal-overlay" style="display:none;">
        <div class="modal-box">
            <div class="modal-icon">💾</div>
            <div class="modal-title">检测到未保存的标注</div>
            <div class="modal-info" id="autosave-modal-info"></div>
            <div class="modal-buttons">
                <button id="autosave-btn-restore" class="btn btn-primary">恢复</button>
                <button id="autosave-btn-discard" class="btn btn-secondary">不恢复</button>
            </div>
        </div>
    </div>

    <div id="fft-modal" class="modal-overlay hidden">
        <div class="modal-box fft-modal-box">
            <div class="modal-header">
                <h3 id="fft-title">FFT 功率谱分析</h3>
                <button id="fft-close" class="btn-sm">&times;</button>
            </div>
            <div class="fft-controls">
                <div class="fft-control-group">
                    <label>通道:</label>
                    <select id="fft-channel-select"></select>
                </div>
                <div class="fft-control-group">
                    <label>窗口:</label>
                    <select id="fft-window-select">
                        <option value="hann">汉宁窗</option>
                        <option value="hamming">汉明窗</option>
                        <option value="blackman">布莱克曼窗</option>
                        <option value="rectangle">矩形窗</option>
                    </select>
                </div>
                <div class="fft-control-group">
                    <label>坐标:</label>
                    <select id="fft-scale-select">
                        <option value="log">对数 (dB)</option>
                        <option value="linear">线性</option>
                    </select>
                </div>
            </div>
            <div class="fft-canvas-container">
                <canvas id="fft-canvas"></canvas>
            </div>
            <div id="fft-info" class="fft-info"></div>
        </div>
    </div>

    <!-- 标注类型设置面板 -->
    <div id="label-types-modal" class="modal-overlay hidden">
        <div class="modal-box label-types-modal-box">
            <div class="modal-header">
                <h3>标注类型设置</h3>
                <button id="label-types-close" class="btn-sm modal-close-btn" title="关闭">&times;</button>
            </div>
            <div class="label-types-toolbar">
                <button id="btn-add-label-type" class="btn btn-primary">+ 添加类型</button>
                <button id="btn-reset-label-types" class="btn btn-secondary">重置默认</button>
            </div>
            <div id="label-types-list" class="label-types-list"></div>
            <div class="label-types-hint">提示：双击名称可编辑 │ 点击颜色圆点换颜色 │ ↑↓ 调整顺序</div>
        </div>
    </div>

    <!-- 自定义确认对话框（替代原生confirm） -->
    <div id="confirm-dialog" class="modal-overlay hidden">
        <div class="modal-box confirm-dialog-box">
            <div class="modal-header">
                <h3 id="confirm-title">确认</h3>
            </div>
            <p id="confirm-message"></p>
            <div class="confirm-actions">
                <button id="confirm-ok" class="btn btn-danger">确定</button>
                <button id="confirm-cancel" class="btn btn-secondary">取消</button>
            </div>
        </div>
    </div>
</body>
    <script src="edf-parser.js"></script>
    <script src="gl-renderer.js"></script>
    <script src="app.js"></script>
</body>
</html>
